<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comic animé</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #f8f4ea 0%, #e8eefc 100%);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 1000px;
      max-width: 95vw;
      height: 600px;
      background: #ffffff;
      border: 5px solid #111;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.15);
    }

    .background {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 230, 120, 0.35), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(120, 190, 255, 0.25), transparent 20%),
        linear-gradient(to top, #d8f1d2 0 30%, #dff0ff 30% 100%);
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 140px;
      background: #a8df8e;
      border-top: 5px solid #111;
    }

    .panel-label {
      position: absolute;
      top: 18px;
      left: 18px;
      padding: 8px 14px;
      background: #ffdb4d;
      border: 3px solid #111;
      border-radius: 14px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.5px;
      z-index: 20;
    }

    .character {
      position: absolute;
      left: 110px;
      bottom: 95px;
      width: 220px;
      height: 340px;
      opacity: 0;
      transform: translateY(40px) scale(0.96);
      transition: all 0.8s ease;
      z-index: 5;
    }

    .character.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .character.float {
      animation: floatChar 2.2s ease-in-out infinite;
    }

    @keyframes floatChar {
      0%   { transform: translateY(0) scale(1); }
      50%  { transform: translateY(-8px) scale(1.01); }
      100% { transform: translateY(0) scale(1); }
    }

    .head {
      position: absolute;
      top: 30px;
      left: 55px;
      width: 110px;
      height: 110px;
      background: #ffd9b3;
      border: 4px solid #111;
      border-radius: 50%;
      z-index: 3;
    }

    .hair {
      position: absolute;
      top: 18px;
      left: 45px;
      width: 130px;
      height: 70px;
      background: #2f1f16;
      border: 4px solid #111;
      border-bottom: none;
      border-radius: 60px 60px 25px 25px;
      z-index: 4;
    }

    .eye {
      position: absolute;
      top: 68px;
      width: 16px;
      height: 16px;
      background: #111;
      border-radius: 50%;
      z-index: 5;
    }

    .eye.left {
      left: 85px;
    }

    .eye.right {
      left: 122px;
    }

    .mouth {
      position: absolute;
      top: 96px;
      left: 101px;
      width: 20px;
      height: 10px;
      border-bottom: 4px solid #111;
      border-radius: 0 0 20px 20px;
      z-index: 5;
    }

    .body {
      position: absolute;
      top: 135px;
      left: 65px;
      width: 100px;
      height: 120px;
      background: #5da9ff;
      border: 4px solid #111;
      border-radius: 24px;
      z-index: 2;
    }

    .arm {
      position: absolute;
      top: 150px;
      width: 26px;
      height: 95px;
      background: #ffd9b3;
      border: 4px solid #111;
      border-radius: 20px;
      z-index: 1;
      transform-origin: top center;
    }

    .arm.left {
      left: 48px;
      transform: rotate(18deg);
    }

    .arm.right {
      left: 157px;
      transform: rotate(-25deg);
      animation: wave 1.2s ease-in-out infinite;
    }

    @keyframes wave {
      0%   { transform: rotate(-25deg); }
      50%  { transform: rotate(-10deg); }
      100% { transform: rotate(-25deg); }
    }

    .leg {
      position: absolute;
      top: 246px;
      width: 28px;
      height: 80px;
      background: #2d5b9f;
      border: 4px solid #111;
      border-radius: 18px;
      z-index: 1;
    }

    .leg.left {
      left: 82px;
    }

    .leg.right {
      left: 122px;
    }

    .bubble {
      position: absolute;
      min-width: 250px;
      max-width: 330px;
      padding: 18px 20px;
      background: white;
      border: 4px solid #111;
      border-radius: 22px;
      box-shadow: 8px 8px 0 #111;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 700;
      opacity: 0;
      transform: translateY(20px) scale(0.96);
      transition: all 0.5s ease;
      z-index: 15;
    }

    .bubble.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .bubble::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      background: white;
      border-right: 4px solid #111;
      border-bottom: 4px solid #111;
      transform: rotate(45deg);
    }

    .bubble.one {
      top: 90px;
      left: 300px;
    }

    .bubble.one::after {
      left: 38px;
      bottom: -14px;
    }

    .bubble.two {
      top: 235px;
      right: 90px;
      background: #fff4a8;
    }

    .bubble.two::after {
      left: 40px;
      bottom: -14px;
      background: #fff4a8;
    }

    .type-text {
      min-height: 64px;
    }

    .cursor {
      display: inline-block;
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .caption {
      position: absolute;
      bottom: 18px;
      right: 20px;
      background: #111;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 30;
    }

    @media (max-width: 820px) {
      .scene {
        height: 720px;
      }

      .character {
        left: 40px;
        bottom: 110px;
        transform-origin: bottom left;
        scale: 0.9;
      }

      .bubble.one {
        top: 70px;
        left: 220px;
        max-width: 250px;
        font-size: 20px;
      }

      .bubble.two {
        top: 300px;
        right: 30px;
        max-width: 240px;
        font-size: 20px;
      }
    }

    @media (max-width: 640px) {
      .scene {
        height: 760px;
      }

      .character {
        left: 10px;
        bottom: 120px;
        scale: 0.78;
      }

      .bubble.one {
        top: 40px;
        left: 150px;
        max-width: 200px;
        font-size: 18px;
      }

      .bubble.two {
        top: 330px;
        right: 15px;
        max-width: 200px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="background"></div>
    <div class="panel-label">SCÈNE 01</div>

    <div class="character" id="character">
      <div class="hair"></div>
      <div class="head"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
      <div class="body"></div>
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>

    <div class="bubble one" id="bubble1">
      <div class="type-text" id="text1"></div>
    </div>

    <div class="bubble two" id="bubble2">
      <div class="type-text" id="text2"></div>
    </div>

    <div class="ground"></div>
    <div class="caption">Comic animé HTML / CSS / JS</div>
  </div>

  <script>
    const character = document.getElementById("character");
    const bubble1 = document.getElementById("bubble1");
    const bubble2 = document.getElementById("bubble2");
    const text1 = document.getElementById("text1");
    const text2 = document.getElementById("text2");

    function typeWriter(element, text, speed = 40, callback) {
      element.innerHTML = "";
      let i = 0;

      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "|";
      element.appendChild(cursor);

      function write() {
        if (i < text.length) {
          cursor.insertAdjacentText("beforebegin", text.charAt(i));
          i++;
          setTimeout(write, speed);
        } else {
          setTimeout(() => {
            cursor.remove();
            if (callback) callback();
          }, 300);
        }
      }

      write();
    }

    function startScene() {
      setTimeout(() => {
        character.classList.add("show");

        setTimeout(() => {
          character.classList.add("float");
        }, 850);
      }, 400);

      setTimeout(() => {
        bubble1.classList.add("show");
        typeWriter(
          text1,
          "Salut ! Je peux raconter une histoire en mode comic.",
          35,
          () => {
            setTimeout(() => {
              bubble2.classList.add("show");
              typeWriter(
                text2,
                "Et je peux aussi afficher le texte petit à petit, comme dans une BD animée.",
                28
              );
            }, 700);
          }
        );
      }, 1400);
    }

    startScene();
  </script>
</body>
</html>
